<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>COLORPUNKS / A · GRID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --b: 3px solid #000; --b2: 2px solid #000; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #fff;
      color: #000;
      font-family: 'Jost', 'Futura', 'Century Gothic', sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    body { padding: 32px 40px 24px; }
    canvas, img { image-rendering: pixelated; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: var(--b);
      padding-bottom: 14px;
      margin-bottom: 24px;
    }
    .logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      line-height: 0.9;
    }
    .logo small { font-weight: 500; font-size: 0.45em; letter-spacing: 0.2em; display: block; margin-top: 6px; }
    .tagline {
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-align: right;
      line-height: 1.6;
    }
    .wallet {
      border: var(--b2);
      padding: 6px 10px;
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      display: inline-block;
      margin-top: 8px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 24px;
    }
    .panel { border: var(--b); background: #fff; }
    .panel-head {
      border-bottom: var(--b);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
    }
    .panel-body { padding: 14px; }

    /* PUNKS */
    .punks { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .punk {
      border: var(--b2);
      background: #fff;
      cursor: pointer;
      position: relative;
      aspect-ratio: 1;
      padding: 0;
    }
    .punk.sel { outline: 4px solid #000; outline-offset: 2px; }
    .punk img { width: 100%; height: 100%; display: block; }
    .punk-tag {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #000;
      color: #fff;
      padding: 3px 6px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-align: left;
    }

    /* CANVAS */
    .canvas-wrap { display: flex; flex-direction: column; align-items: stretch; gap: 12px; }
    .canvas-frame {
      border: var(--b);
      width: 440px; height: 440px;
      padding: 0;
      align-self: center;
    }
    canvas { width: 100%; height: 100%; cursor: crosshair; display: block; }

    .toolbar { display: flex; width: 100%; border: var(--b); }
    .tool {
      flex: 1;
      background: #fff;
      border: none;
      border-right: var(--b);
      padding: 10px;
      font-family: inherit;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .tool:last-child { border-right: none; }
    .tool:hover { background: #000; color: #fff; }

    .picked-bar { width: 100%; border: var(--b); display: flex; min-height: 52px; }
    .picked-swatch { width: 52px; border-right: var(--b); background: #fff; }
    .picked-meta { padding: 8px 14px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .picked-name { text-transform: uppercase; font-weight: 800; font-size: 13px; letter-spacing: 0.14em; }
    .picked-hex { font-family: ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 0.05em; margin-top: 2px; }
    .picked-meta.empty .picked-name { color: #999; }

    .save {
      width: 100%;
      background: #000;
      color: #fff;
      border: var(--b);
      padding: 18px;
      font-family: inherit;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .save:hover { background: #fff; color: #000; }

    /* COLORS */
    .colors {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: var(--b2);
      border-left: var(--b2);
    }
    .color {
      border-right: var(--b2);
      border-bottom: var(--b2);
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
      padding: 0;
      background: transparent;
    }
    .color.sel::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 3px solid #000;
      box-shadow: 0 0 0 2px #fff inset;
    }
    .color-name {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.92);
      color: #000;
      padding: 3px 4px;
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      border-top: 1px solid #000;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .footer {
      margin-top: 28px;
      border-top: var(--b);
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
    }
    .variant-nav { display: flex; gap: 8px; }
    .variant-nav a {
      border: 2px solid #000;
      padding: 4px 10px;
      text-decoration: none;
      color: #000;
      font-weight: 700;
    }
    .variant-nav a.here { background: #000; color: #fff; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      COLORPUNKS<small>/ DIY · VARIATION A · GRID</small>
    </div>
    <div class="tagline">
      PAINT YOUR PUNKS WITH YOUR BASECOLORS<br/>
      ON-CHAIN · NO BACKEND · BASE MAINNET
      <div class="wallet">0xDEADBEEF…4242 ◆ CONNECTED</div>
    </div>
  </header>

  <main class="grid3">
    <section class="panel">
      <div class="panel-head">
        <span>01 / YOUR PUNKS</span>
        <span id="punkCount">—</span>
      </div>
      <div class="panel-body">
        <div id="punks" class="punks"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span>02 / CANVAS</span>
        <span id="punkInfo">—</span>
      </div>
      <div class="panel-body canvas-wrap">
        <div class="canvas-frame">
          <canvas id="canvas" width="512" height="512"></canvas>
        </div>
        <div class="toolbar">
          <button class="tool" id="undo">UNDO</button>
          <button class="tool" id="reset">RESET</button>
        </div>
        <div class="picked-bar">
          <div class="picked-swatch" id="pickedSwatch"></div>
          <div class="picked-meta empty" id="pickedMeta">
            <div class="picked-name" id="pickedName">NO COLOR SELECTED</div>
            <div class="picked-hex" id="pickedHex">—</div>
          </div>
        </div>
        <button class="save">SAVE ON-CHAIN →</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span>03 / YOUR BASECOLORS</span>
        <span id="colorCount">—</span>
      </div>
      <div class="panel-body">
        <div id="colors" class="colors"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>BASE MAINNET · CHAIN 8453</span>
    <div class="variant-nav">
      <a href="./grid.html" class="here">A · GRID</a>
      <a href="./editorial.html">B · EDITORIAL</a>
      <a href="./negative.html">C · NEGATIVE</a>
    </div>
    <span>V0.1 / MOCKUP</span>
  </footer>

  <script src="./_shared.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const api = Mockup.mountCanvas(canvas);

    const punksEl = document.getElementById('punks');
    let currentPunk = Mockup.PUNKS[0];
    function renderPunks() {
      punksEl.innerHTML = '';
      Mockup.PUNKS.forEach(p => {
        const b = document.createElement('button');
        b.className = 'punk' + (p.tokenId === currentPunk.tokenId ? ' sel' : '');
        b.innerHTML = '<img src="' + p.src + '" alt="' + p.name + '"/><div class="punk-tag">#' + p.tokenId + '</div>';
        b.addEventListener('click', () => {
          currentPunk = p;
          api.loadPunk(p.src);
          document.getElementById('punkInfo').textContent = '#' + p.tokenId;
          renderPunks();
        });
        punksEl.appendChild(b);
      });
      document.getElementById('punkCount').textContent = String(Mockup.PUNKS.length).padStart(2, '0');
    }

    const colorsEl = document.getElementById('colors');
    let currentColor = null;
    function renderColors() {
      colorsEl.innerHTML = '';
      Mockup.COLORS.forEach(c => {
        const b = document.createElement('button');
        b.className = 'color' + (c.hex === currentColor ? ' sel' : '');
        b.style.backgroundColor = c.hex;
        if (c.name) b.innerHTML = '<span class="color-name">' + c.name.toUpperCase() + '</span>';
        b.title = (c.name ? c.name + ' — ' : '') + c.hex;
        b.addEventListener('click', () => {
          currentColor = c.hex;
          api.setColor(c.hex);
          document.getElementById('pickedSwatch').style.backgroundColor = c.hex;
          document.getElementById('pickedName').textContent = (c.name || c.hex).toUpperCase();
          document.getElementById('pickedHex').textContent = c.hex;
          document.getElementById('pickedMeta').classList.remove('empty');
          renderColors();
        });
        colorsEl.appendChild(b);
      });
      document.getElementById('colorCount').textContent = String(Mockup.COLORS.length).padStart(2, '0');
    }

    document.getElementById('undo').addEventListener('click', () => api.undo());
    document.getElementById('reset').addEventListener('click', () => api.reset());

    renderPunks();
    renderColors();
    api.loadPunk(currentPunk.src);
    document.getElementById('punkInfo').textContent = '#' + currentPunk.tokenId;
  </script>
</body>
</html>
